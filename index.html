function hydrateHero(h){
  const dediBase = h.dedi ? DEDI_EQ[h.dedi] : null;
  const heroFileName = h.hero.replace(/ /g,"").replace('LuBu','Lubu').replace('BaiLong','BaiLong');
  const eePath = img(`images/gears/ee/${h.rarity}/${heroFileName}.png`);
  return{...h,
    gear:   h.gear    ? GEAR_SETS[h.gear]   : null,
    accMain:h.accMain ? ACC_MAIN[h.accMain] : null,
    accSub: h.accSub  ? ACC_SUB[h.accSub]   : null,
    dedi: dediBase ? {...dediBase, icon: eePath, effect: h.dediEffect || dediBase.effect} : null,
  };
}
function hydrateTeam(t){return{...t,heroes:t.heroes.map(hydrateHero)};}

// ─── FORMATION ───────────────────────────────────────────────────
const FORMATION_COLS={
  "1b4f":{back:[2],      front:[0,1,3,4]},
  "2b3f":{back:[1,3],    front:[0,2,4]  },
  "3b2f":{back:[0,2,4],  front:[1,3]    },
  "4b1f":{back:[0,1,3,4],front:[2]      },
};
function buildGrid(heroes,formation){
  const cols=FORMATION_COLS[formation]||FORMATION_COLS["1b4f"];
  const grid=Array(5).fill(null).map(()=>({back:null,front:null}));
  const back=heroes.filter(h=>h.row==="back");
  const front=heroes.filter(h=>h.row==="front");
  cols.back.forEach((c,i)=>{if(back[i])grid[c].back=back[i];});
  cols.front.forEach((c,i)=>{if(front[i])grid[c].front=front[i];});
  return grid;
}
function gridHeroOrder(grid){
  const seen=new Set(),order=[];
  grid.forEach(col=>{
    if(col.back  &&!seen.has(col.back.slot)) {seen.add(col.back.slot); order.push(col.back.slot);}
    if(col.front &&!seen.has(col.front.slot)){seen.add(col.front.slot);order.push(col.front.slot);}
  });
  return order;
}

// ─── POPUP HOOK ─────────────────────────────────────────────────
function usePopup(){
  const[open,setOpen]=useState(false);
  const ref=useRef();
  useEffect(()=>{
    if(!open)return;
    const h=e=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[open]);
  return{open,setOpen,ref};
}

function IconBtn({emoji,label,popupContent}){
  const{open,setOpen,ref}=usePopup();
  const btnRef=useRef();
  const[pos,setPos]=useState({x:0,y:0});
  const handleClick=e=>{
    e.stopPropagation();
    if(!open){
      const rect=btnRef.current.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      const popupHeight = 120; // approximate popup height
      if(spaceBelow < popupHeight){
        // Open upward
        setPos({x:rect.left+rect.width/2, y:rect.top, flip:true});
      } else {
        // Open downward
        setPos({x:rect.left+rect.width/2, y:rect.bottom+8, flip:false});
      }
    }
    setOpen(v=>!v);
  };
  return(
    <div style={{position:"relative",display:"inline-block"}}>
      <button ref={btnRef} onClick={handleClick} title={label} style={{
        width:"clamp(32px,4vw,52px)",height:"clamp(32px,4vw,52px)",borderRadius:0,cursor:"pointer",fontSize:"clamp(16px,2vw,24px)",
        border:"none",
        background:open?color+"33":"transparent",
        display:"flex",alignItems:"center",justifyContent:"center",
        transition:"all 0.15s",transform:open?"scale(1.18)":"scale(1)",
        padding:0,overflow:"hidden",
      }}>
        {emoji && (emoji.startsWith("http") || emoji.endsWith(".png"))
          ? <img src={emoji} alt=""
              style={{width:"100%",height:"100%",objectFit:"cover"}}
              onError={e=>e.target.style.display="none"}/>
          : emoji
        }
      </button>
      {open&&ReactDOM.createPortal(
        <div ref={ref} style={{
          position:"fixed",
          left:Math.max(8,Math.min(pos.x-115,window.innerWidth-238)),
          top:pos.flip ? pos.y-8 : pos.y,
          transform:pos.flip ? "translateY(-100%)" : "none",
          width:230,
          background:"#1e2a3a",border:"1px solid #3a4a5a",
          borderRadius:R,padding:12,zIndex:9999,
          boxShadow:"0 8px 32px #000000cc",
          pointerEvents:"auto",
        }}>
          <div style={{fontSize:11,fontWeight:800,color:C.text,marginBottom:5}}>{label}</div>
          <div style={{fontSize:11,color:C.textMid,lineHeight:1.65}}>{popupContent}</div>
        </div>,
        document.body
      )}
    </div>
  );
}

// ─── FORMATION GRID ──────────────────────────────────────────────
// BACK_ROW_H: fixed height for the back row cell.
// Front row sits immediately below with a small gap.
// Negative margin pulls front row UP, reducing dead space.
const BACK_ROW_H  = 360;
const COMPACT_H   = 240;
const ROW_OVERLAP = 170; // px overlap — works with fluid portraits since back row height is auto

function FormationGrid({heroes,formation,compact=false}){
  const grid=buildGrid(heroes,formation||"1b4f");
  const Card=compact?CompactHeroCard:HeroCard;
  const backH=compact?COMPACT_H:BACK_ROW_H;
  return(
    <div style={{flex:1,minWidth:0,display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4}}>
      {grid.map((col,i)=>(
        <div key={i} style={{display:"flex",flexDirection:"column",minWidth:0}}>
          {/* Back row cell — fixed height creates the stagger gap */}
          <div style={{
            height:backH,
            display:"flex",alignItems:"flex-start",
            overflow:"visible", // allow card to extend beyond for visual effect
          }}>
            {col.back ? <Card hero={col.back}/> : <div style={{width:"100%",height:"100%"}}/>}
          </div>
          {/* Front row — pulls up by ROW_OVERLAP for stagger effect */}
          <div style={{
            marginTop:`-${ROW_OVERLAP}px`,
            display:"flex",alignItems:"flex-start",
            position:"relative",zIndex:1,
          }}>
            {col.front ? <Card hero={col.front}/> : null}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── STAT TABLE ─────────────────────────────────────────────────

  const hasAny=ordered.some(h=>h[statKey]&&Object.values(h[statKey]).some(v=>v!=="-"));
  if(!hasAny)return null;

  // Distinct accent colour per table type
  const accent    = statKey==="critRate" ? "#f05a28" : "#f5d76e"; // reddish-orange for crit, pale yellow for weakness
  const accentDim = statKey==="critRate" ? "#f05a2822" : "#f5d76e22";
  const accentBorder = statKey==="critRate" ? "#f05a2855" : "#f5d76e55";

  return(
    <div style={{
      border:`1px solid ${accentBorder}`,
      borderRadius:R, overflow:"hidden",
    }}>
      {/* Table header bar */}
      <div style={{
        padding:"7px 12px",
        background:`linear-gradient(90deg,${accentDim},transparent)`,
        borderBottom:`1px solid ${accentBorder}`,
        display:"flex",alignItems:"center",gap:8,
      }}>
        <div style={{width:3,height:14,background:accent,borderRadius:2,flexShrink:0}}/>
        <div style={{fontSize:10,fontWeight:700,color:accent,
          letterSpacing:2,textTransform:"uppercase"}}>{title}</div>
      </div>
      {/* CSS grid — SOURCE col + 5 equal hero cols */}
      <div style={{display:"grid",gridTemplateColumns:`140px repeat(${ordered.length},1fr)`}}>
        {/* Header row */}
        <div style={{padding:"6px 10px",fontSize:9,color:C.textDim,fontWeight:600,
          background:C.card,borderBottom:`1px solid ${C.border}`}}></div>
        {ordered.map(h=>(
          <div key={h.slot} style={{padding:"6px 6px",textAlign:"center",
            background:C.card,borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:8,color:slotColor(h.slot),fontWeight:700,marginBottom:2}}>{h.slot}</div>
            <div style={{fontSize:10,color:C.text,fontWeight:800,
              borderBottom:`2px solid ${typeColor(h.type)}`,paddingBottom:3,
              display:"inline-block",minWidth:40}}>{h.hero}</div>
          </div>
        ))}
        {/* Data rows */}
        {STAT_ROWS.filter(({key})=>!(statKey==="weakHit"&&key==="base")).map(({key,label},i)=>(
          <>
            <div key={`label-${key}`} style={{padding:"5px 10px",color:C.textDim,fontWeight:600,fontSize:10,
              background:i%2===0?C.surface+"44":"transparent",
              borderBottom:`1px solid ${C.border}22`}}>{label}</div>
            {ordered.map(h=>{
              const v=h[statKey]?.[key];
              const empty=v===undefined||v==="-";
              return(
                <div key={`${h.slot}-${key}`} style={{padding:"5px 6px",textAlign:"center",
                  fontSize:11,
                  color:empty?C.textDim+"44":C.text,
                  background:!empty&&+v>0?accentDim:i%2===0?C.surface+"44":"transparent",
                  borderBottom:`1px solid ${C.border}22`}}>
                  {empty?"—":v}
                </div>
              );
            })}
          </>
        ))}
        {/* Total row */}
        <div style={{padding:"6px 10px",color:C.gold,fontWeight:800,fontSize:11,
          background:C.gold+"12",borderTop:`1px solid ${C.gold}44`}}>TOTAL</div>
        {ordered.map(h=>(
          <div key={`total-${h.slot}`} style={{padding:"6px 6px",textAlign:"center",
            color:C.gold,fontWeight:800,fontSize:12,
            background:C.gold+"12",borderTop:`1px solid ${C.gold}44`}}>
            {h[statKey]?.total??"—"}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── SKILL TIMELINE ─────────────────────────────────────────────
function SkillTimeline({queue,heroes}){
  const[activeKey,setActiveKey]=useState(null);
  const[tooltipPos,setTooltipPos]=useState({x:0,y:0});
  const tooltipRef=useRef();
  useEffect(()=>{
    if(activeKey===null)return;
    const h=e=>{if(tooltipRef.current&&!tooltipRef.current.contains(e.target))setActiveKey(null);};
    document.addEventListener("mousedown",h);
    return()=>document.removeEventListener("mousedown",h);
  },[activeKey]);
  if(!queue||queue.length===0)return(
    <div style={{padding:16,textAlign:"center",color:C.textDim,fontSize:12,
      background:C.card,borderRadius:RS}}>No skill queue data.</div>
  );
  const maxTurn=Math.max(...queue.map(q=>q.turn), 75); // minimum 20 slots (0–76)
  const turns=[];
  for(let t=0;t<=maxTurn;t+=4)turns.push(t);
  const skColor=s=>s==="SE"?"#7c3aed":"#b45309";
  const activeEntry=queue.find(q=>q.turn===activeKey);
  const activeHero=activeEntry?heroes.find(h=>h.slot===activeEntry.slot):null;
  const sc=activeHero?typeColor(activeHero.type):C.border;
  return(
    <div style={{overflowX:"auto",paddingBottom:6,position:"relative"}}>
      {/* Tooltip — fixed position just above the clicked button */}
      {activeKey!==null&&activeEntry&&(
        <div ref={tooltipRef} style={{
          position:"fixed",
          left: Math.max(8, Math.min(tooltipPos.x - 100, window.innerWidth - 216)),
          top: tooltipPos.y - 10,
          transform:"translateY(-100%)",
          width:200,
          background:C.surface,border:`1px solid ${sc}55`,
          borderRadius:R,padding:12,zIndex:9999,
          boxShadow:"0 8px 32px #000000cc",
          pointerEvents:"auto",
        }}>
          {/* caret pointing down */}
          <div style={{position:"absolute",bottom:-5,left:"50%",
            transform:"translateX(-50%) rotate(45deg)",width:8,height:8,
            background:C.surface,border:`1px solid ${sc}44`,
            borderTop:"none",borderLeft:"none"}}/>
          <div style={{fontSize:11,fontWeight:800,color:sc,marginBottom:2}}>
            Turn {activeKey} — {activeHero?.hero}
          </div>
          <div style={{fontSize:10,fontWeight:700,color:skColor(activeEntry.skill),marginBottom:5}}>
            {activeEntry.skill==="SE"?"Special Skill":"Active Skill"}
          </div>
          <div style={{fontSize:11,color:C.textMid,lineHeight:1.6}}>
            {activeEntry.note||"Execute skill as indicated."}
          </div>
        </div>
      )}
      <div style={{display:"flex",minWidth:turns.length*56}}>
        {turns.map(turn=>{
          const entry=queue.find(q=>q.turn===turn);
          const hero=entry?heroes.find(h=>h.slot===entry.slot):null;
          const sc=hero?typeColor(hero.type):C.border;
          const isActive=activeKey===turn;
          return(
            <div key={turn} style={{width:56,flexShrink:0,
              display:"flex",flexDirection:"column",alignItems:"center"}}>
              <button onClick={e=>{
                if(!entry){setActiveKey(null);return;}
                const rect=e.currentTarget.getBoundingClientRect();
                setTooltipPos({x:rect.left+rect.width/2, y:rect.top});
                setActiveKey(isActive?null:turn);
              }} style={{
                width:44,height:44,borderRadius:0,
                border:`2px solid ${entry?sc:C.border}`,
                background:entry?(isActive?sc+"44":sc+"18"):C.card,
                cursor:entry?"pointer":"default",
                display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,
                opacity:entry?1:0.18,transition:"all 0.15s",
                transform:isActive?"scale(1.1)":"scale(1)",
              }}>
                {entry&&<>
                  {entry.skillIcon
                    ? <img src={img(`images/skills/heroes/${entry.skillIcon}`)} alt={entry.skill}
                        style={{width:"100%",height:"100%",objectFit:"contain"}}
                        onError={e=>{e.target.style.display="none";}}/>
                    : <>
                        <span style={{fontSize:9,fontWeight:800,color:sc}}>{hero?.hero?.slice(0,4).toUpperCase()}</span>
                        <span style={{fontSize:8,fontWeight:800,padding:"1px 4px",borderRadius:0,
                          background:skColor(entry.skill),color:"#fff"}}>{entry.skill}</span>
                      </>
                  }
                </>}
              </button>
              <div style={{width:1,height:6,background:entry?sc+"55":C.border+"22"}}/>
              <div style={{fontSize:9,fontWeight:entry?700:400,
                color:entry?C.gold:C.textDim+"44"}}>{turn}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── BOSS SKILL BTN — opens DOWNWARD ────────────────────────────

  const[open,setOpen]=useState(false);

              background:statsExpanded?C.blue+"12":C.card,
              border:"none",cursor:"pointer",
              borderBottom:statsExpanded?`1px solid ${C.border}`:"none",
            }}>
              <span style={{fontSize:10,fontWeight:700,color:C.textMid,
                letterSpacing:2,textTransform:"uppercase"}}>Crit Rate & Weakness Hit Breakdown</span>
              <span style={{fontSize:11,color:C.textDim}}>{statsExpanded?"▲":"▼"}</span>
            </button>
            {statsExpanded&&(
              <div style={{padding:"14px 14px",display:"flex",flexDirection:"column",gap:16,background:C.card}}>
                <StatTable heroes={team.heroes} heroOrder={heroOrder} statKey="critRate" title="Crit Rate Breakdown"/>
                <StatTable heroes={team.heroes} heroOrder={heroOrder} statKey="weakHit"  title="Weakness Hit Breakdown"/>
              </div>
            )}
          </div>
        )}
        {queues.length>0&&(
          <div style={{border:`1px solid ${C.blue}44`,borderRadius:R,overflow:"hidden"}}>
            {/* Header bar */}
            <div style={{
              padding:"8px 14px",
              background:`linear-gradient(90deg,${C.blue}22,transparent)`,
              borderBottom:`1px solid ${C.blue}33`,
              display:"flex",alignItems:"center",justifyContent:"space-between",
            }}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:3,height:14,background:C.blue,borderRadius:2,flexShrink:0}}/>
                <div style={{fontSize:10,fontWeight:700,color:C.blue,letterSpacing:2,textTransform:"uppercase"}}>Skill Queue</div>
              </div>
              {queues.length>1&&(
                <div style={{display:"flex",gap:5}}>
                  {queues.map((q,i)=>(
                    <button key={i} onClick={()=>setActiveQueue(i)} style={{
                      padding:"3px 10px",borderRadius:RS,border:"none",cursor:"pointer",
                      fontSize:10,fontWeight:700,
                      background:activeQueue===i?C.blue:C.card,
                      color:activeQueue===i?"#fff":C.textDim,
                    }}>{q.label}</button>
                  ))}
                </div>
              )}
            </div>
            <div style={{padding:"10px 10px"}}>
              <SkillTimeline queue={queues[activeQueue]?.queue||[]} heroes={team.heroes}/>
            </div>
          </div>
        )}
        {team.extraNotes&&(
          <div style={{background:C.gold+"0a",border:`1px solid ${C.gold}22`,borderRadius:RS,padding:"10px 14px"}}>
            <div style={{fontSize:10,fontWeight:700,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginBottom:5}}>📋 Team Notes</div>
            <div style={{fontSize:11,color:C.textMid,lineHeight:1.7}}>{team.extraNotes}</div>
          </div>
        )}
      </div>
    </div>
  );
}

function AltTeamBlock({team}){
  return <TeamBlock team={team} isMain={false} compactGrid/>;
}
